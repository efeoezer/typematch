        {% if profile.mbti_type %}

            <p style="font-size: 0.9em; color: #333; line-height: 1.6;">

        {% endif %}
        
        <div style="margin-top: 30px; text-align: left; background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #eee;">

                {% csrf_token %}

                <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">

                    {% endif %}

                    {% if current_photo %}
                    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee;">

                            🗑️ Mevcut Fotoğrafı Kaldır
                        </a>
                    </div>
                    {% endif %}
                </div>
                
                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.85em; color: #7f8c8d; font-weight: bold;">Adın</label>
                        <input type="text" name="first_name" value="{{ u_form.first_name.value|default:'' }}" placeholder="Örn: Ad" style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 0.9em;" required>

                    <div style="flex: 1;">

                        <input type="text" name="last_name" value="{{ u_form.last_name.value|default:'' }}" placeholder="Örn: Soyad" style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 0.9em;">
                    </div>
                </div>
                
                <div>
                    <label style="font-size: 0.85em; color: #7f8c8d; font-weight: bold;">Kullanıcı Adı</label>
                    <input type="text" name="username" value="{{ u_form.username.value|default:'' }}" style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 0.9em;">
                </div>
                
                <div>
                    <label style="font-size: 0.85em; color: #7f8c8d; font-weight: bold;">E-Posta</label>
                    <input type="email" name="email" value="{{ u_form.email.value|default:'' }}" style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 0.9em;">
                </div>
                
                <div class="location-picker" style="display: flex; gap: 15px; width: 100%;">
                    <select id="country-select" name="country" class="custom-select" style="flex: 1;">
                        <option value="">Ülke Seçin</option>
                    </select>
                    <select id="city-select" name="city" class="custom-select" style="flex: 1;">
                        <option value="">Önce Ülke Seçin</option>
                    </select>
                </div>

                <div>
                    <label style="font-size: 0.85em; color: #7f8c8d; font-weight: bold;">Biyografi</label>
                    <textarea name="bio" rows="3" placeholder="Kendinden biraz bahset..." style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 0.9em; resize: none;">{{ p_form.bio.value|default:'' }}</textarea>
                </div>

                <button type="submit" style="background: #3498db; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px;">Kaydet ve Güncelle</button>
            </form>
            <div style="margin-top: 40px; padding-top: 20px; border-top: 2px solid #fee2e2;">
                <a href="{% url 'edit_lifestyle' %}" class="dropdown-item">
    ⚙️ Yaşam Standartlarımı Güncelle
</a>

        Hesabımı tamamen silmek istiyorum
    </a>
</div>
        </div>
    </div>
    <div class="chart-container">
        <div style="position: relative; height: 100%; width: 100%; max-height: 500px; max-width: 500px;">
            <canvas id="mbtiRadarChart"></canvas>
        </div>
    </div>
    </div>
<div style="max-width: 1000px; margin: 0 auto 40px auto; background: #ffffff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;">
    <h3 style="color: #2d3748; font-size: 1.2em; margin-bottom: 10px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px;">🧠 MBTI Harfleri Ne Anlama Geliyor?</h3>
    <p style="font-size: 0.9em; color: #718096; margin-bottom: 20px; line-height: 1.6;">
        Ev arkadaşı eşleşme algoritmamız, psikolojik tercihlerinizi 4 farklı eksende analiz eder. Zıt harfler birbirini dengeleyebilir veya çatışma yaratabilir. İşte o 8 temel harfin anlamı:
    </p>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        
        <div style="background: #f7fafc; padding: 15px; border-radius: 8px; border-left: 4px solid #f6e05e;">
            <h4 style="font-size: 0.95em; color: #4a5568; margin-bottom: 10px;">⚡ 1. Enerji Yönü (Dünya ile Etkileşim)</h4>
            <p style="font-size: 0.85em; color: #4a5568; margin-bottom: 8px;"><strong>(E) Dışadönük (Extravert):</strong> Enerjisini dış dünyadan, insanlarla vakit geçirmekten ve aksiyondan alır.</p>
            <p style="font-size: 0.85em; color: #4a5568; margin-bottom: 0;"><strong>(I) İçe Dönük (Introvert):</strong> Enerjisini iç dünyasından, düşüncelerinden ve yalnız kalmaktan alır.</p>
        </div>

        <div style="background: #f7fafc; padding: 15px; border-radius: 8px; border-left: 4px solid #63b3ed;">
            <h4 style="font-size: 0.95em; color: #4a5568; margin-bottom: 10px;">🔍 2. Bilgi İşleme (Algılama Biçimi)</h4>
            <p style="font-size: 0.85em; color: #4a5568; margin-bottom: 8px;"><strong>(S) Duyusal (Sensing):</strong> Somut gerçeklere, detaylara ve ana odaklanır.</p>
            <p style="font-size: 0.85em; color: #4a5568; margin-bottom: 0;"><strong>(N) Sezgisel (Intuition):</strong> Soyut kavramlara, büyük resme ve geleceğe odaklanır.</p>
        </div>

        <div style="background: #f7fafc; padding: 15px; border-radius: 8px; border-left: 4px solid #fc8181;">
            <h4 style="font-size: 0.95em; color: #4a5568; margin-bottom: 10px;">⚖️ 3. Karar Verme (Kriterler)</h4>
            <p style="font-size: 0.85em; color: #4a5568; margin-bottom: 8px;"><strong>(T) Mantıksal (Thinking):</strong> Kararlarını objektif mantık, analiz ve neden-sonuç ilişkisine göre alır.</p>
            <p style="font-size: 0.85em; color: #4a5568; margin-bottom: 0;"><strong>(F) Duygusal (Feeling):</strong> Kararlarını kişisel değerler, empati ve diğer insanlara olan etkisine göre alır.</p>
        </div>

        <div style="background: #f7fafc; padding: 15px; border-radius: 8px; border-left: 4px solid #68d391;">
            <h4 style="font-size: 0.95em; color: #4a5568; margin-bottom: 10px;">📅 4. Yaşam Tarzı (Dış Dünya Düzeni)</h4>
            <p style="font-size: 0.85em; color: #4a5568; margin-bottom: 8px;"><strong>(J) Planlı (Judging):</strong> Düzeni, kuralları ve netliği sever.</p>
            <p style="font-size: 0.85em; color: #4a5568; margin-bottom: 0;"><strong>(P) Esnek (Perceiving):</strong> Spontanlık ve açık uçluluk sever.</p>
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const ctx = document.getElementById('mbtiRadarChart').getContext('2d');
        
        const rawData = {{ chart_data|safe }};
        
        const data = {
            labels: [
                'Dışadönüklük (E)',
                'Duyusallık (S)',
                'Mantıksallık (T)',
                'Planlılık (J)'
            ],
            datasets: [{
                label: 'Bilişsel Fonksiyon Spektrumu',
                data: rawData,
                backgroundColor: 'rgba(52, 152, 219, 0.2)',
                borderColor: 'rgba(52, 152, 219, 1)',
                pointBackgroundColor: 'rgba(52, 152, 219, 1)',
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: 'rgba(52, 152, 219, 1)'
            }]
        };

        const config = {
            type: 'radar',
            data: data,
            options: {
                // Grafiğin orantılı büyümesini sağlayan ayar
                maintainAspectRatio: false,
                elements: {
                    line: { borderWidth: 3 }
                },
                scales: {
                    r: {
                        angleLines: { display: true },
                        suggestedMin: 0,
                        suggestedMax: 100,
                        ticks: {
                            stepSize: 20
                        }
                    }
                },
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        };

        new Chart(ctx, config);
    });
    const countrySelect = document.getElementById('country-select');
const citySelect = document.getElementById('city-select');

// 1. Tüm dünyadaki ülkeleri çek ve listeye ekle
fetch("https://countriesnow.space/api/v0.1/countries/positions")
    .then(res => res.json())
    .then(data => {
        data.data.forEach(c => {
            let opt = new Option(c.name, c.name);
            countrySelect.add(opt);
        });
    });

// 2. Ülke seçilince şehirleri getir
countrySelect.addEventListener('change', function() {
    const countryName = this.value;
    citySelect.innerHTML = '<option>Yükleniyor...</option>';
    
    fetch("https://countriesnow.space/api/v0.1/countries/cities", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ "country": countryName })
    })
    .then(res => res.json())
    .then(data => {
        citySelect.innerHTML = '<option value="">Şehir Seçin</option>';
        data.data.forEach(city => {
            let opt = new Option(city, city);
            citySelect.add(opt);
        });
    });
});
</script>
